<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
    >
    <title>Axiom Web Radar</title>
    <link
        rel="stylesheet"
        href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
        crossorigin=""
    >
    <link rel="stylesheet" href="radar_viewer.css">
</head>
<body>
    <div id="map"></div>

    <div class="top-bar">
        <div class="toolbar-left">
            <div id="presetButtons" class="preset-buttons"></div>
            <button id="gpsButton" class="gps-button" type="button">Follow GPS</button>
        </div>
        <div id="statusBadge" class="status-badge">Waiting for radar session...</div>
    </div>

    <div class="bottom-panel">
        <div class="playback-buttons">
            <button id="prevButton" class="icon-button" type="button" aria-label="Previous frame">&#9664;&#9664;</button>
            <button id="playButton" class="icon-button" type="button" aria-label="Play or pause">Play</button>
            <button id="nextButton" class="icon-button" type="button" aria-label="Next frame">&#9654;&#9654;</button>
            <button id="refreshButton" class="icon-button" type="button" aria-label="Refresh session">&#8635;</button>
        </div>
        <div id="timeLabel" class="time-label">--</div>
        <div class="timeline-block">
            <input id="timelineSlider" class="range-input" type="range" min="0" max="0" value="0">
        </div>
        <div class="speed-block">
            <span class="speed-label">Speed</span>
            <input id="speedSlider" class="range-input" type="range" min="0.5" max="4" step="0.5" value="1">
            <span id="speedValue" class="speed-value">1.0x</span>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" crossorigin=""></script>
    <script src="radar_viewer.js"></script>
</body>
</html>
